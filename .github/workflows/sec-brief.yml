on:
  schedule:
    - cron: '0 11 * * *'  # 6am ET (EST=UTC-5); change to '0 10 * * *' Mar-Nov (EDT)

jobs:
  run-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install anthropic
      - run: python agents/sec-morning-brief/run_brief.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEC_BRIEF_AGENT_ID: ${{ secrets.SEC_BRIEF_AGENT_ID }}
          SEC_BRIEF_ENV_ID: ${{ secrets.SEC_BRIEF_ENV_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: sec-brief
          path: sec_brief_*.md
